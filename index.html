    <!-- Installable web app (PWA). Without a manifest + the apple-mobile tags,
         iOS treats the home-screen icon's stored login as evictable and drops
         it; an installed PWA gets persistent storage so the session survives. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#080d1c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MATKON" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
